name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend (lint / typecheck / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: prettier (format check)
        run: npm run fmt:check
      - name: typecheck
        run: npm run typecheck --workspace @yuruwollet/frontend
      - name: eslint
        run: npm run lint --workspace @yuruwollet/frontend
      - name: unit + functions tests (coverage 80%)
        run: npm run test --workspace @yuruwollet/frontend

  backend:
    name: backend (go / wasm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum
      - name: gofmt check
        run: test -z "$(gofmt -l .)" || (echo 'gofmt diff:'; gofmt -l .; exit 1)
      - name: go vet (native + wasm glue)
        run: |
          go vet ./internal/...
          GOOS=js GOARCH=wasm go vet .
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
          args: ./internal/...
      - name: go test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./internal/...
      - name: build wasm + report gzip size
        run: |
          go run github.com/syumai/workers/cmd/workers-assets-gen -mode=go
          GOOS=js GOARCH=wasm go build -o ./build/app.wasm .
          SIZE=$(gzip -c build/app.wasm | wc -c)
          echo "WASM gzip size: ${SIZE} bytes (free plan limit: 3145728)"
          test "${SIZE}" -lt 3145728 || (echo 'WASM exceeds free-plan 3MB gzip limit'; exit 1)

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: install playwright browsers
        run: npm run install-browsers --workspace @yuruwollet/e2e
      - name: run e2e
        run: npm run test --workspace @yuruwollet/e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

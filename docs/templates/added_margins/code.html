<style>
        body {
            background-color: #FFFFFF; /* Override surface for specific prompt request */
            color: #25271F;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        ::-webkit-scrollbar-track {
            background: transparent;

            background: rgba(37, 39, 31, 0.1);

    body {
      min-height: max(884px, 100dvh);

<body class="antialiased min-h-screen flex flex-col relative pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="docked full-width top-0 bg-background dark:bg-background flat no shadows flex justify-between items-center w-full px-container-mobile h-16 sticky z-40 bg-opacity-90 backdrop-blur-md">
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center overflow-hidden ghost-border">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="person">person</span>
</div>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">二人のウィッシュリスト</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow w-full max-w-[1200px] mx-auto py-8 md:py-12 px-8 md:px-16">
<!-- Tab Switcher -->
<div class="flex justify-center mb-16">
<div class="inline-flex bg-surface-container-low p-2 rounded-full ghost-border">
<button class="px-8 py-3 rounded-full bg-primary-container text-on-primary-container font-label-sm text-label-sm shadow-sm transition-all">
                    ほしい物
                </button>
<button class="px-8 py-3 rounded-full text-on-surface-variant font-label-sm text-label-sm hover:bg-surface-variant/50 transition-all">
                    行きたい場所
                </button>
</div>
</div>
<!-- Item List (NO IMAGES, Cafe Menu Style) -->
<div class="flex flex-col gap-12 md:gap-16 max-w-2xl mx-auto relative">
<!-- Vertical connecting line (subtle) -->
<div class="absolute left-6 top-10 bottom-10 w-px bg-[#25271F] opacity-5 hidden md:block"></div>
<!-- Item 1 -->
<article class="group relative flex gap-6 items-start cursor-pointer transition-transform hover:translate-x-2 duration-300">
<div class="hidden md:flex w-12 h-12 rounded-full bg-surface-container-lowest ghost-border items-center justify-center z-10 shrink-0">
<span class="material-symbols-outlined text-primary-container" data-icon="coffee_maker">coffee_maker</span>
</div>
<div class="flex-grow bg-surface-container-lowest rounded-2xl p-6 ghost-border transition-all group-hover:shadow-[0_10px_30px_rgba(37,39,31,0.05)]">
<div class="flex justify-between items-start mb-4">
<h2 class="font-headline-md text-headline-md text-primary-container">新しいコーヒーメーカー</h2>
<span class="px-3 py-1 bg-surface-variant text-on-surface-variant rounded-2xl font-label-sm text-label-sm">未購入</span>
</div>
<div class="flex items-center gap-2 text-on-surface-variant font-body-md text-body-md">
<span class="material-symbols-outlined text-sm" data-icon="person_add">person_add</span>
<span>Added by Partner A</span>
</div>
<div class="mt-4 flex justify-end opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-outline" data-icon="info">info</span>
</div>
</div>
</article>
<!-- Item 2 -->
<article class="group relative flex gap-6 items-start cursor-pointer transition-transform hover:translate-x-2 duration-300">
<div class="hidden md:flex w-12 h-12 rounded-full bg-surface-container-lowest ghost-border items-center justify-center z-10 shrink-0">
<span class="material-symbols-outlined text-primary-container" data-icon="chair">chair</span>
</div>
<div class="flex-grow bg-surface-container-lowest rounded-2xl p-6 ghost-border transition-all group-hover:shadow-[0_10px_30px_rgba(37,39,31,0.05)]">
<div class="flex justify-between items-start mb-4">
<h2 class="font-headline-md text-headline-md text-primary-container">ダイニングチェア（2脚）</h2>
<span class="px-3 py-1 bg-primary-container text-on-primary-container rounded-2xl font-label-sm text-label-sm">検討中</span>
</div>
<div class="flex items-center gap-2 text-on-surface-variant font-body-md text-body-md">
<span class="material-symbols-outlined text-sm" data-icon="person_add">person_add</span>

</div>
<div class="mt-4 flex justify-end opacity-0 group-hover:opacity-100 transition-opacity">

</div>
</div>

<!-- Item 3 -->

</div>
<div class="flex items-center gap-2 text-on-surface-variant font-body-md text-body-md">
<span class="material-symbols-outlined text-sm" data-icon="person_add">person_add</span>

</div>
<div class="mt-4 flex justify-end opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-outline" data-icon="info">info</span>
</div>
</div>

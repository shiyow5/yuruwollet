name: Deploy

# Phase 11 で本番結線を有効化する。現状は手動トリガのみ（secrets 未設定でも CI を汚さない）。
on:
  workflow_dispatch:

jobs:
  deploy:
    name: deploy (migrations + frontend + backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum
      - run: npm ci

      # スキーマはコードより先に適用する（失敗時に「新コード × 旧スキーマ」を避ける）。
      # supabase/ は Phase 1 で作成。それまでは migrations が無いため db push は no-op。
      # --db-url なら link も access token も DB パスワードも要らない（.env と同じ入力に揃える）。
      # Session pooler の接続文字列を使うこと（Transaction pooler:6543 は DDL に使えない）。
      - name: apply supabase migrations
        run: npx supabase db push --db-url "${{ secrets.DATABASE_URL }}"

      # VITE_ 変数は **ビルド時**にバンドルへ埋め込まれる。
      # ここで渡さないと、Cloudflare Pages 側の環境変数（= 実行時）は届かず、
      # ローカル用の既定値（127.0.0.1 + demo anon key）を焼き込んだバンドルが本番に出てしまう。
      - name: build frontend
        run: npm run build --workspace @yuruwollet/frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # frontend から実行すること。wrangler は **カレントディレクトリの functions/** を
      # Pages Functions としてバンドルする。リポジトリルートから叩くと
      # frontend/functions/api/session.ts が拾われず、/api/session が消える。
      - name: deploy frontend (Cloudflare Pages)
        run: cd frontend && npx wrangler pages deploy dist --project-name yuruwollet --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: deploy backend (Go Cron Worker)
        run: cd backend && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

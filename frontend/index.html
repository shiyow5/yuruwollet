<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- SVG favicon に対応しないブラウザ・ブックマーク用 -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
    <!-- iOS の「ホーム画面に追加」。iOS は manifest の icons を見ない -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!--
      crossorigin="use-credentials" が必須。
      Cloudflare Access が全パスをゲートしているので、クッキーの無いリクエストは
      ログイン画面へ 302 される。そして manifest の取得は **既定でクッキーを送らない**
      （HTML 仕様の CORS settings attribute: crossorigin を省略すると credentials は omit）。
      これが無いと、ログイン済みでも manifest だけ 302 を食らって読み込めず、
      「ホーム画面に追加」でアプリ名もアイコンもテーマ色も効かない。
      favicon と apple-touch-icon は <img> 相当で same-origin のクッキーが載るので影響しない。
    -->
    <link rel="manifest" href="/site.webmanifest" crossorigin="use-credentials" />
    <meta name="theme-color" content="#769cbf" />

    <title>yuruwollet</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

name: Deploy

# Phase 11 で本番結線を有効化する。現状は手動トリガのみ（secrets 未設定でも CI を汚さない）。
on:
  workflow_dispatch:

jobs:
  deploy:
    name: deploy (migrations + frontend + backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum
      - run: npm ci

      # スキーマはコードより先に適用する（失敗時に「新コード × 旧スキーマ」を避ける）。
      # supabase/ は Phase 1 で作成。それまでは migrations が無いため db push は no-op。
      - name: link supabase project
        run: npx supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: apply supabase migrations
        run: npx supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: build frontend
        run: npm run build --workspace @yuruwollet/frontend

      - name: deploy frontend (Cloudflare Pages)
        run: cd frontend && npx wrangler pages deploy dist --project-name yuruwollet
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: deploy backend (Go Cron Worker)
        run: cd backend && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

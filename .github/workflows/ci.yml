name: CI

on:
  pull_request:
  push:
    branches: [main]

# 既定の GITHUB_TOKEN は読み取りだけでよい。
# デプロイ先の資格情報は secrets（Cloudflare / Supabase）で、GITHUB_TOKEN は使わない。
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend (lint / typecheck / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: prettier (format check)
        run: npm run fmt:check
      - name: typecheck
        run: npm run typecheck --workspace @yuruwollet/frontend
      - name: eslint
        run: npm run lint --workspace @yuruwollet/frontend
      - name: unit + functions tests (coverage 80%)
        run: npm run test --workspace @yuruwollet/frontend

  backend:
    name: backend (go / wasm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum
      - name: gofmt check
        run: test -z "$(gofmt -l .)" || (echo 'gofmt diff:'; gofmt -l .; exit 1)
      - name: go vet (native + wasm glue)
        run: |
          go vet ./internal/...
          GOOS=js GOARCH=wasm go vet .
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
          args: ./internal/...
      - name: go test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./internal/...
      - name: build wasm + report gzip size
        run: |
          go run github.com/syumai/workers/cmd/workers-assets-gen -mode=go
          # -s -w でシンボル/デバッグ情報を落とす。標準 Go の WASM は素だと 3MB 上限に肉薄する。
          GOOS=js GOARCH=wasm go build -trimpath -ldflags="-s -w" -o ./build/app.wasm .
          SIZE=$(gzip -c build/app.wasm | wc -c)
          echo "WASM gzip size: ${SIZE} bytes (free plan limit: 3145728)"
          test "${SIZE}" -lt 3145728 || (echo 'WASM exceeds free-plan 3MB gzip limit'; exit 1)
      # go test はネイティブ実行なので WASM の fetch 経路を通らない。
      # 「ビルドは通るが workerd では毎回 panic する」を捕まえられるのはここだけ。
      # (2026-07-13: Go 標準の http.Client を使っていて cron が本番で毎回落ちていた)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: cron スモークテスト (workerd で scheduled を実行)
        working-directory: .
        run: python3 scripts/cron_smoke.py

  supabase:
    name: supabase (schema / rls / rpc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: start supabase (local stack)
        run: npx supabase start
      - name: db reset (migrations + seed)
        run: npx supabase db reset
      - name: pgTAP tests (RLS / RPC)
        run: npx supabase test db

      # スキーマの静的検査（#43）。
      #
      # **`--fail-on warning` を必ず付けること。** 付けないと `db lint` は指摘を
      # 表示するだけで **exit 0 を返す**ので、CI は緑のまま警告が積み上がる
      # （実際に確認した: 未使用変数のある関数を入れても exit code は 0 だった）。
      - name: db lint (schema static analysis)
        run: npx supabase db lint --level warning --fail-on warning

      - name: verify generated types are up to date
        run: |
          npx supabase gen types typescript --local > /tmp/database.types.ts
          if ! diff -q frontend/src/lib/database.types.ts /tmp/database.types.ts; then
            echo 'database.types.ts が古いです。`make gen-types` を実行してコミットしてください。'
            diff -u frontend/src/lib/database.types.ts /tmp/database.types.ts || true
            exit 1
          fi
      - name: stop supabase
        if: always()
        run: npx supabase stop

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: install playwright browsers
        run: npm run install-browsers --workspace @yuruwollet/e2e
      # 未認証のスモーク / CSP（vite preview、Pages Functions も supabase も無い世界）。
      - name: run e2e (unauthenticated smoke / csp)
        run: npm run test --workspace @yuruwollet/e2e

      # --- full-stack E2E（#6）: 本物の全経路を通す ---
      # Access 迂回(DEV_BYPASS) → /api/session の JWT → supabase REST → RLS(household 一致) → 描画。
      # e2e ジョブは supabase ジョブとは別ランナーなのでポート衝突しない。
      - name: start supabase (local stack)
        run: npx supabase start
      - name: db reset (migrations + seed)
        run: npx supabase db reset
      - name: write .dev.vars for wrangler pages dev
        # /api/session はこの鍵で発行 JWT を署名し、supabase 側の検証鍵と一致する必要がある。
        # **実行中の supabase から取得**し（CLI 既定が変わっても追随）、取れなければ固定の公開 default に
        # フォールバックする（現状はこれと一致）。本番の秘密ではないのでログに出ても問題ない。
        run: |
          JWT_SECRET="$(npx supabase status -o env 2>/dev/null \
            | sed -n 's/^JWT_SECRET="\{0,1\}\([^"]*\)"\{0,1\}$/\1/p')"
          : "${JWT_SECRET:=super-secret-jwt-token-with-at-least-32-characters-long}"
          cat > frontend/.dev.vars <<VARS
          SUPABASE_URL=http://127.0.0.1:54321
          SUPABASE_JWT_SECRET=$JWT_SECRET
          EMAIL_YURURI=yururi@example.com
          EMAIL_SHIYOWO=shiyowo@example.com
          DEV_BYPASS_EMAIL=yururi@example.com
          VARS
      - name: seed test data (#44)
        # 「自分/相手タブで残高が変わる」等、**両メンバーに別々のデータがある**前提のテストが
        # あるため（db reset 直後は両方 0 で見分けがつかない）。
        # 投入スクリプト自体（#44）の CI 検証も兼ねる。
        run: python3 scripts/seed_testdata.py --apply
      - name: run full-stack e2e (wrangler pages dev + supabase)
        run: npm run test:fullstack --workspace @yuruwollet/e2e
      - name: stop supabase
        if: always()
        run: npx supabase stop

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

  # main への push で、4 つのジョブが **全部緑のときだけ** 本番へ出す。
  #
  # ここ（CI と同じワークフロー・同じイベント）に置くのが要点。
  # 別ワークフロー + workflow_run にすると、fork の PR で走った CI の成功を拾って
  # deploy が **secrets 付きで攻撃者の commit** を実行してしまう（"pwn request"）。
  # このリポジトリは public なので、それは「誰でも本番 DB に任意の SQL を流せる」に等しい。
  #
  # if の event チェックが唯一の門番:
  #   - pull_request（fork 含む）では push ではないので走らない
  #   - そもそも fork の PR には secrets が渡らない
  deploy:
    name: deploy (production)
    needs: [frontend, backend, supabase, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit

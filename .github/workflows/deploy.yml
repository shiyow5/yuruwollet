name: Deploy

# ci.yml から呼ばれる（main への push で、4 つの CI ジョブが全部緑のときだけ）。
#
# **workflow_run は使わない。**
# workflow_run の branches フィルタは「トリガした側の head_branch」を見るため、
# fork のブランチ名を main にすれば一致してしまう。CI は fork の PR でも走って
# success になるので、deploy が **secrets 付きで攻撃者の commit を checkout** し、
# supabase db push で本番 DB に任意の SQL を流せる（GitHub の "pwn request"）。
# public repo では致命的。
#
# 呼び出し元と同じイベント・同じ commit の上で needs により直列化する。
# fork の PR は event が pull_request なので、ci.yml 側の if で構造的に到達しない。
on:
  workflow_call:
  workflow_dispatch:

# デプロイは直列化する。並走すると migration とデプロイの順序が崩れる。
# 既定の GITHUB_TOKEN は読み取りだけでよい。
# デプロイ先の資格情報は secrets（Cloudflare / Supabase）で、GITHUB_TOKEN は使わない。
permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy (migrations + frontend + backend)
    runs-on: ubuntu-latest
    steps:
      # 呼び出し元と同じ commit が既定で checkout される（ref を指定しない）。
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum
      - run: npm ci

      # 必要な secret が 1 つでも欠けていると、途中まで出て中途半端な本番になる。
      # **何も出す前に**まとめて検査する。
      - name: verify required secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=""
          for name in DATABASE_URL VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY \
                      CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            [ -n "${!name}" ] || missing="$missing $name"
          done
          if [ -n "$missing" ]; then
            echo "必要な GitHub secret が未設定です:$missing"
            exit 1
          fi
          # ローカル用の既定値が本番に焼き込まれるのを防ぐ（一度やらかすと気づきにくい）
          case "$VITE_SUPABASE_URL" in
            *127.0.0.1*|*localhost*)
              echo "VITE_SUPABASE_URL がローカルを指しています: $VITE_SUPABASE_URL"; exit 1 ;;
          esac

      # スキーマはコードより先に適用する（失敗時に「新コード × 旧スキーマ」を避ける）。
      # Session pooler の接続文字列を使うこと（Transaction pooler:6543 は DDL に使えない）。
      #
      # **run: に ${{ }} を直接展開しない。** DB パスワードに $ や ` が含まれると
      # bash が展開して接続文字列が壊れる。env: 経由で渡し、クォートして参照する。
      - name: apply supabase migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx supabase db push --db-url "$DATABASE_URL"

      # VITE_ 変数は **ビルド時**にバンドルへ埋め込まれる。
      # ここで渡さないと、Cloudflare Pages 側の環境変数（= 実行時）は届かず、
      # ローカル用の既定値（127.0.0.1 + demo anon key）を焼き込んだバンドルが本番に出てしまう。
      - name: build frontend
        run: npm run build --workspace @yuruwollet/frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ビルド結果に本番の Supabase URL が焼き込まれたかを実物で確認する。
      # ここが空振りしていても Pages のデプロイ自体は成功してしまう。
      - name: verify bundle points at production Supabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          if ! grep -rqF "$VITE_SUPABASE_URL" frontend/dist/assets; then
            echo 'ビルド成果物に本番の Supabase URL が入っていません（VITE_ の渡し忘れ）'
            exit 1
          fi
          if grep -rqE '127\.0\.0\.1:54321|localhost:54321' frontend/dist/assets; then
            echo 'ビルド成果物にローカルの Supabase URL が残っています'
            exit 1
          fi

      # CSP の connect-src はビルド時に組み立てられる（#41）。ここがローカルを指したまま
      # 本番に出ると、**CSP が本番 Supabase への通信を全部塞ぐ**。画面は出るのにデータが
      # 一切読めない、という一番厄介な壊れ方をする。
      # 「バンドルが指す先」と「CSP が許可する先」を突き合わせるので、
      # デプロイ経路が増えても成立する（make deploy-frontend も同じスクリプトを呼ぶ）。
      - name: verify CSP allows production Supabase
        run: python3 scripts/verify_csp.py frontend/dist --production

      # frontend から実行すること。wrangler は **カレントディレクトリの functions/** を
      # Pages Functions としてバンドルする。リポジトリルートから叩くと
      # frontend/functions/api/session.ts が拾われず、/api/session が消える。
      #
      # --branch main も必須。wrangler は git のブランチ名でデプロイ先（production か
      # preview か）を決めるため、明示しないと preview に出て本番が変わらない。
      - name: deploy frontend (Cloudflare Pages)
        working-directory: frontend
        run: npx wrangler pages deploy dist --project-name yuruwollet --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: deploy backend (Go Cron Worker)
        working-directory: backend
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 出したものが生きているかを見る。Access が前に立っているので 200 は返らない。
      # **302（Access のログイン画面へ）が正常**。500 や 404 なら壊れている。
      - name: smoke test (production)
        run: |
          CODE=$(curl -s -o /dev/null -w '%{http_code}' https://yuruwollet.pages.dev/)
          echo "GET https://yuruwollet.pages.dev/ → $CODE"
          case "$CODE" in
            200|302|401|403) echo 'Access が応答しています' ;;
            *) echo "想定外のステータス: $CODE"; exit 1 ;;
          esac
